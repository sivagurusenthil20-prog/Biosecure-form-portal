<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Register Farm - BioSecure Farm</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="logo">BioSecure Farm</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="register.html">Farm Registration</a>
      <a href="checklist.html">Checklist</a>
      <a href="alerts.html">Alerts</a>
      <a href="guidance.html">Guidance</a>
    </nav>

  <main class="page">
    <h2>Farm Registration</h2>

    <div class="card form-card">
      <label>Farm Name</label>
      <input type="text" id="farmNameInput" placeholder="Enter farm name" />

      <label>Farm Type</label>
      <select id="farmTypeInput">
        <option value="Pig Farm">Pig Farm</option>
        <option value="Poultry Farm">Poultry Farm</option>
      </select>

      <button class="btn" onclick="saveFarm()">Save Farm</button>
      <p id="saveMsg"></p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
