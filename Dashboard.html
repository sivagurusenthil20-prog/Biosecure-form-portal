<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - BioSecure Farm</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="logo">BioSecure Farm</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="register.html">Farm Registration</a>
      <a href="checklist.html">Checklist</a>
      <a href="alerts.html">Alerts</a>
      <a href="guidance.html">Guidance</a>
    </nav>
  </header>

  <main class="page">
    <h2>Dashboard</h2>

    <div class="stats">
      <div class="stat-card">
        <h3>Farm Name</h3>
        <p id="farmName">Not registered</p>
      </div>
      <div class="stat-card">
        <h3>Farm Type</h3>
        <p id="farmType">Not selected</p>
      </div>
      <div class="stat-card">
        <h3>Risk Score</h3>
        <p id="riskScore">0%</p>
      </div>
    </div>

    <div class="card">
      <h3>Biosecurity Status</h3>
      <p id="statusText">Complete the checklist to calculate your farm risk score.</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
